        // Zero-Inflated Poisson Distribution Calculator
        class ZIPDistribution {
            constructor(lambda, pi) {
                this.lambda = lambda;  // Poisson rate parameter
                this.pi = pi;          // Zero-inflation probability
            }

            // Poisson probability mass function
            poissonPMF(k) {
                return Math.exp(-this.lambda) * Math.pow(this.lambda, k) / this.factorial(k);
            }

            factorial(n) {
                if (n <= 1) return 1;
                return n * this.factorial(n - 1);
            }

            // ZIP probability mass function
            zipPMF(k) {
                if (k === 0) {
                    return this.pi + (1 - this.pi) * this.poissonPMF(0);
                } else {
                    return (1 - this.pi) * this.poissonPMF(k);
                }
            }

            // Calculate probability of exactly k goals
            probability(k) {
                return this.zipPMF(k);
            }

            // Calculate probability of k or more goals
            probabilityAtLeast(k) {
                let sum = 0;
                for (let i = k; i <= k + 10; i++) {
                    sum += this.zipPMF(i);
                }
                return sum;
            }

            // Calculate probability of fewer than k goals
            probabilityLessThan(k) {
                let sum = 0;
                for (let i = 0; i < k; i++) {
                    sum += this.zipPMF(i);
                }
                return sum;
            }
        }

        // Calculate market odds using ZIP distribution
        function calculateZIPOdds(homeOdds, awayOdds, drawOdds) {
            // Convert odds to implied probabilities
            const homeProb = 1 / homeOdds;
            const awayProb = 1 / awayOdds;
            const drawProb = 1 / drawOdds;

            // Estimate lambda parameters from implied probabilities
            const homeLambda = -Math.log(drawProb) * 0.8;
            const awayLambda = -Math.log(drawProb) * 0.8;

            // Zero-inflation parameter (estimate based on defensive strength)
            const pi = Math.max(0.05, Math.min(0.3, drawProb * 0.5));

            // Create ZIP distributions for home and away
            const homeZIP = new ZIPDistribution(homeLambda, pi);
            const awayZIP = new ZIPDistribution(awayLambda, pi);

            // Calculate various market probabilities
            const markets = {
                over_2_5: {
                    label: 'Over 2.5 Goals',
                    probability: calculateTotalGoalsProbability(homeZIP, awayZIP, 3, 'over'),
                    odds: null
                },
                under_2_5: {
                    label: 'Under 2.5 Goals',
                    probability: calculateTotalGoalsProbability(homeZIP, awayZIP, 3, 'under'),
                    odds: null
                },
                btts_yes: {
                    label: 'Both Teams to Score',
                    probability: (1 - homeZIP.probability(0)) * (1 - awayZIP.probability(0)),
                    odds: null
                },
                btts_no: {
                    label: 'BTTS No',
                    probability: homeZIP.probability(0) + awayZIP.probability(0) - homeZIP.probability(0) * awayZIP.probability(0),
                    odds: null
                },
                home_win: {
                    label: 'Home Win',
                    probability: homeProb,
                    odds: homeOdds
                },
                draw: {
                    label: 'Draw',
                    probability: drawProb,
                    odds: drawOdds
                },
                away_win: {
                    label: 'Away Win',
                    probability: awayProb,
                    odds: awayOdds
                }
            };

            // Convert probabilities to fair odds (removing margin)
            Object.keys(markets).forEach(key => {
                if (!markets[key].odds) {
                    markets[key].odds = 1 / markets[key].probability;
                }
            });

            return {
                markets,
                zipParams: {
                    homeLambda: homeLambda.toFixed(3),
                    awayLambda: awayLambda.toFixed(3),
                    pi: pi.toFixed(3)
                }
            };
        }

        function calculateTotalGoalsProbability(homeZIP, awayZIP, threshold, type) {
            let prob = 0;
            for (let h = 0; h <= 10; h++) {
                for (let a = 0; a <= 10; a++) {
                    const total = h + a;
                    if (type === 'over' && total >= threshold) {
                        prob += homeZIP.probability(h) * awayZIP.probability(a);
                    } else if (type === 'under' && total < threshold) {
                        prob += homeZIP.probability(h) * awayZIP.probability(a);
                    }
                }
            }
            return prob;
        }

            list.innerHTML = '';

            competitionsData.categories.forEach(category => {
                const regionHeader = document.createElement('div');
                regionHeader.className = 'region-header';
                regionHeader.textContent = category.name;
                list.appendChild(regionHeader);

                const regionGroup = document.createElement('div');
                regionGroup.className = 'region-group';

                category.competitions.forEach(comp => {
                    const item = document.createElement('div');
                    item.className = 'competition-item';
                    item.dataset.key = comp.key;
                    item.innerHTML = `
                        <span class="competition-name">${comp.name}</span>
                        <span class="event-count">${comp.eventCount}</span>
                    `;
                    item.addEventListener('click', () => loadCompetitionData(comp));
                    regionGroup.appendChild(item);
                });

                list.appendChild(regionGroup);
            });
        }

        // Generate mock events for demonstration
        function generateMockEvents(competition) {
            const teams = {
                'soccer-england-premier-league': [
                    ['Manchester City', 'Liverpool'], ['Arsenal', 'Chelsea'], 
                    ['Manchester United', 'Tottenham'], ['Newcastle', 'Brighton']
                ],
                'soccer-spain-laliga': [
                    ['Real Madrid', 'Barcelona'], ['Atletico Madrid', 'Sevilla'],
                    ['Real Sociedad', 'Valencia'], ['Villarreal', 'Athletic Bilbao']
                ],
                'soccer-germany-bundesliga': [
                    ['Bayern Munich', 'Borussia Dortmund'], ['RB Leipzig', 'Bayer Leverkusen'],
                    ['Union Berlin', 'Eintracht Frankfurt'], ['Freiburg', 'Wolfsburg']
                ],
                'soccer-italy-serie-a': [
                    ['Inter Milan', 'AC Milan'], ['Juventus', 'Napoli'],
                    ['Roma', 'Lazio'], ['Atalanta', 'Fiorentina']
                ],
                'default': [
                    ['Home Team A', 'Away Team A'], ['Home Team B', 'Away Team B'],
                    ['Home Team C', 'Away Team C'], ['Home Team D', 'Away Team D']
                ]
            };

            const matchups = teams[competition.key] || teams['default'];
            const now = new Date();
            
            return matchups.map((teams, index) => ({
                home: { name: teams[0] },
                away: { name: teams[1] },
                cutoffTime: new Date(now.getTime() + (index + 1) * 86400000).toISOString(),
                type: 'EVENT_TYPE_EVENT',
                markets: {
                    'soccer.match_odds': {
                        submarkets: {
                            'period=ft': {
                                selections: [
                                    { outcome: 'home', price: 2.1 + Math.random() * 0.5, probability: 0.4 },
                                    { outcome: 'draw', price: 3.2 + Math.random() * 0.4, probability: 0.28 },
                                    { outcome: 'away', price: 2.8 + Math.random() * 0.6, probability: 0.32 }
                                ]
                            }
                        }
                    },
                    'soccer.total_goals': {
                        submarkets: {
                            'period=ft': {
                                selections: [
                                    { outcome: 'over', params: 'total=2.5', price: 1.85 + Math.random() * 0.2, probability: 0.52 },
                                    { outcome: 'under', params: 'total=2.5', price: 1.95 + Math.random() * 0.15, probability: 0.48 }
                                ]
                            }
                        }
                    }
                }
            }));
        }

        // Load competition data from Cloudbet API
        async function loadCompetitionData(competition) {
            // Update active state
            document.querySelectorAll('.competition-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // Update header
            document.getElementById('contentTitle').textContent = competition.name;
            document.getElementById('contentSubtitle').textContent = `Loading events...`;

            // Show loading state
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <h3>Loading events...</h3>
                    <p>Fetching odds from Cloudbet API</p>
                </div>
            `;

            try {
                // Use Netlify function when deployed, fallback to mock data locally
                const isNetlify = window.location.hostname.includes('netlify.app') || 
                                 window.location.hostname.includes('netlify.com');
                
                let competitionEvents = [];
                
                if (isNetlify) {
                    // Use Netlify serverless function
                    const apiUrl = `/.netlify/functions/proxy/${competition.key}`;
                    const response = await fetch(apiUrl);
                    
                    if (!response.ok) throw new Error(`API returned ${response.status}`);
                    
                    const data = await response.json();
                    competitionEvents = data.events?.filter(event => 
                        event.type === 'EVENT_TYPE_EVENT' &&
                        event.home && event.away &&
                        event.markets?.['soccer.match_odds']
                    ) || [];
                } else {
                    // Local development - use mock data
                    competitionEvents = generateMockEvents(competition);
                }

                // Update subtitle
                const suffix = isNetlify ? '' : ' (Demo Mode)';
                document.getElementById('contentSubtitle').textContent = 
                    `${competitionEvents.length} event${competitionEvents.length !== 1 ? 's' : ''}${suffix}`;

                if (competitionEvents.length === 0) {
                    throw new Error('No events found');
                }

                renderEvents(competitionEvents);

            } catch (error) {
                console.warn('API fetch failed, using mock data:', error.message);
                const mockEvents = generateMockEvents(competition);
                document.getElementById('contentSubtitle').textContent = 
                    `${mockEvents.length} events (Demo Mode)`;
                renderEvents(mockEvents);
            }
        }

        // Render events with ZIP calculations
        function renderEvents(events) {
            const contentArea = document.getElementById('contentArea');
            const eventsHTML = events.map(event => {
                // Get match odds
                const matchOddsMarket = event.markets?.['soccer.match_odds']?.submarkets?.['period=ft'];
                const totalGoalsMarket = event.markets?.['soccer.total_goals']?.submarkets?.['period=ft'];
                
                if (!matchOddsMarket) return '';

                const homeOdds = matchOddsMarket.selections?.find(s => s.outcome === 'home')?.price || 2.0;
                const awayOdds = matchOddsMarket.selections?.find(s => s.outcome === 'away')?.price || 2.0;
                const drawOdds = matchOddsMarket.selections?.find(s => s.outcome === 'draw')?.price || 3.0;

                // Get total goals markets
                const over25 = totalGoalsMarket?.selections?.find(s => s.outcome === 'over' && s.params === 'total=2.5');
                const under25 = totalGoalsMarket?.selections?.find(s => s.outcome === 'under' && s.params === 'total=2.5');

                const zipResults = calculateZIPOdds(homeOdds, awayOdds, drawOdds);

                const eventDate = new Date(event.cutoffTime);
                const formattedDate = eventDate.toLocaleString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                return `
                    <div class="event-card">
                        <div class="event-header">
                            <div class="event-time">${formattedDate}</div>
                        </div>
                        
                        <div class="event-teams">
                            <div class="team">
                                <span class="team-name">${event.home?.name || 'Home Team'}</span>
                            </div>
                            <div class="team">
                                <span class="team-name">${event.away?.name || 'Away Team'}</span>
                            </div>
                        </div>

                        <div class="markets-grid">
                            <div class="market-card">
                                <div class="market-label">Home Win</div>
                                <div class="market-odds">${homeOdds.toFixed(2)}</div>
                                <div class="market-probability">${(zipResults.markets.home_win.probability * 100).toFixed(1)}%</div>
                            </div>
                            <div class="market-card">
                                <div class="market-label">Draw</div>
                                <div class="market-odds">${drawOdds.toFixed(2)}</div>
                                <div class="market-probability">${(zipResults.markets.draw.probability * 100).toFixed(1)}%</div>
                            </div>
                            <div class="market-card">
                                <div class="market-label">Away Win</div>
                                <div class="market-odds">${awayOdds.toFixed(2)}</div>
                                <div class="market-probability">${(zipResults.markets.away_win.probability * 100).toFixed(1)}%</div>
                            </div>
                            <div class="market-card">
                                <div class="market-label">Over 2.5 Goals (ZIP)</div>
                                <div class="market-odds">${zipResults.markets.over_2_5.odds.toFixed(2)}</div>
                                <div class="market-probability">${(zipResults.markets.over_2_5.probability * 100).toFixed(1)}%</div>
                            </div>
                            <div class="market-card">
                                <div class="market-label">Under 2.5 Goals (ZIP)</div>
                                <div class="market-odds">${zipResults.markets.under_2_5.odds.toFixed(2)}</div>
                                <div class="market-probability">${(zipResults.markets.under_2_5.probability * 100).toFixed(1)}%</div>
                            </div>
                            <div class="market-card">
                                <div class="market-label">BTTS Yes (ZIP)</div>
                                <div class="market-odds">${zipResults.markets.btts_yes.odds.toFixed(2)}</div>
                                <div class="market-probability">${(zipResults.markets.btts_yes.probability * 100).toFixed(1)}%</div>
                            </div>
                        </div>

                        ${over25 && under25 ? `
                        <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color);">
                            <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;">Bookmaker O/U 2.5</div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                                <div class="market-card">
                                    <div class="market-label">Over 2.5</div>
                                    <div class="market-odds">${over25.price.toFixed(2)}</div>
                                    <div class="market-probability">${(over25.probability * 100).toFixed(1)}%</div>
                                </div>
                                <div class="market-card">
                                    <div class="market-label">Under 2.5</div>
                                    <div class="market-odds">${under25.price.toFixed(2)}</div>
                                    <div class="market-probability">${(under25.probability * 100).toFixed(1)}%</div>
                                </div>
                            </div>
                        </div>
                        ` : ''}

                        <div class="zip-info">
                            <div class="zip-info-title">ZIP Distribution Parameters</div>
                            <div class="zip-params">
                                <div class="zip-param">
                                    <span class="zip-param-label">Home λ</span>
                                    <span class="zip-param-value">${zipResults.zipParams.homeLambda}</span>
                                </div>
                                <div class="zip-param">
                                    <span class="zip-param-label">Away λ</span>
                                    <span class="zip-param-value">${zipResults.zipParams.awayLambda}</span>
                                </div>
                                <div class="zip-param">
                                    <span class="zip-param-label">Zero Inflation (π)</span>
                                    <span class="zip-param-value">${zipResults.zipParams.pi}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            contentArea.innerHTML = `<div class="events-grid">${eventsHTML}</div>`;
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            document.querySelectorAll('.competition-item').forEach(item => {
                const name = item.querySelector('.competition-name').textContent.toLowerCase();
                item.style.display = name.includes(searchTerm) ? 'flex' : 'none';
            });

            // Also hide/show region headers
            document.querySelectorAll('.region-group').forEach(group => {
                const visibleItems = Array.from(group.querySelectorAll('.competition-item'))
                    .filter(item => item.style.display !== 'none');
                const regionHeader = group.previousElementSibling;
                if (regionHeader && regionHeader.classList.contains('region-header')) {
                    regionHeader.style.display = visibleItems.length > 0 ? 'block' : 'none';
                }
            });
        });

        // Initialize
        loadCompetitions();
    </script>
</body>
</html>
