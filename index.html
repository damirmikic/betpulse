            left: 0;

            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;

        .sidebar-header p {

            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;

            letter-spacing: 1px;

        }

            color: var(--text-primary);

        .competition-item:hover {

        // Zero-Inflated Poisson Distribution Calculator
        class ZIPDistribution {
            constructor(lambda, pi) {
                this.lambda = lambda;  // Poisson rate parameter
                this.pi = pi;          // Zero-inflation probability
            }

            // Poisson probability mass function
            poissonPMF(k) {
                return Math.exp(-this.lambda) * Math.pow(this.lambda, k) / this.factorial(k);
            }

            factorial(n) {
                if (n <= 1) return 1;
                return n * this.factorial(n - 1);
            }

            // ZIP probability mass function
            zipPMF(k) {
                if (k === 0) {
                    return this.pi + (1 - this.pi) * this.poissonPMF(0);
                } else {
                    return (1 - this.pi) * this.poissonPMF(k);
                }
            }

            // Calculate probability of exactly k goals

                return this.zipPMF(k);
            }

            // Calculate probability of k or more goals

                let sum = 0;
                for (let i = k; i <= k + 10; i++) {
                    sum += this.zipPMF(i);
                }
                return sum;
            }

            // Calculate probability of fewer than k goals
            probabilityLessThan(k) {
                let sum = 0;
                for (let i = 0; i < k; i++) {
                    sum += this.zipPMF(i);
                }
                return sum;
            }
        }

                    odds: homeOdds
                },
                draw: {
                    label: 'Draw',
                    probability: drawProb,
                    odds: drawOdds
                },
                away_win: {
                    label: 'Away Win',
                    probability: awayProb,
                    odds: awayOdds
                }
            };

            // Convert probabilities to fair odds (removing margin)
            Object.keys(markets).forEach(key => {
                if (!markets[key].odds) {
                    markets[key].odds = 1 / markets[key].probability;
                }
            });

            return {
                markets,
                zipParams: {
                    homeLambda: homeLambda.toFixed(3),
                    awayLambda: awayLambda.toFixed(3),
                    pi: pi.toFixed(3)
                }
            };
        }

        function calculateTotalGoalsProbability(homeZIP, awayZIP, threshold, type) {
            let prob = 0;
            for (let h = 0; h <= 10; h++) {
                for (let a = 0; a <= 10; a++) {
                    const total = h + a;
                    if (type === 'over' && total >= threshold) {
                        prob += homeZIP.probability(h) * awayZIP.probability(a);
                    } else if (type === 'under' && total < threshold) {
                        prob += homeZIP.probability(h) * awayZIP.probability(a);
                    }
                }
            }
            return prob;
        }

        // Load competitions into sidebar with events
        function loadCompetitions() {
            const list = document.getElementById('competitionsList');
            list.innerHTML = '';

            competitionsData.categories.forEach(category => {
                const regionHeader = document.createElement('div');
                regionHeader.className = 'region-header';
                regionHeader.textContent = category.name;
                list.appendChild(regionHeader);

                const regionGroup = document.createElement('div');
                regionGroup.className = 'region-group';

                category.competitions.forEach(comp => {
                    const item = document.createElement('div');
                    item.className = 'competition-item';
                    item.dataset.key = comp.key;
                    item.innerHTML = `
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="expand-icon">▶</span>
                            <span class="competition-name">${comp.name}</span>
                        </div>
                        <span class="event-count">${comp.eventCount}</span>
                    `;
                    
                    // Create events container
                    const eventsContainer = document.createElement('div');
                    eventsContainer.className = 'events-sublist';
                    eventsContainer.dataset.competitionKey = comp.key;
                    
                    // Click to expand/collapse and load events
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleCompetition(item, eventsContainer, comp);
                    });
                    
                    regionGroup.appendChild(item);
                    regionGroup.appendChild(eventsContainer);
                });

                list.appendChild(regionGroup);
            });
        }

        // Toggle competition expansion and load events
        async function toggleCompetition(competitionItem, eventsContainer, competition) {
            const isExpanded = competitionItem.classList.contains('expanded');
            
            // Collapse all other competitions
            document.querySelectorAll('.competition-item').forEach(item => {
                item.classList.remove('expanded');
            });
            document.querySelectorAll('.events-sublist').forEach(list => {
                list.classList.remove('expanded');
            });
            
            if (isExpanded) {
                // Just collapse
                return;
            }
            
            // Expand this competition
            competitionItem.classList.add('expanded');
            eventsContainer.classList.add('expanded');
            
            // Load events if not already loaded
            if (eventsContainer.children.length === 0) {
                eventsContainer.innerHTML = '<div style="padding: 10px 20px; color: var(--text-muted); font-size: 12px;">Loading events...</div>';
                
                try {
                    const events = await fetchCompetitionEvents(competition);
                    renderEventsList(eventsContainer, events, competition);
                } catch (error) {
                    eventsContainer.innerHTML = `<div style="padding: 10px 20px; color: var(--text-muted); font-size: 12px;">Error loading events</div>`;
                }
            }
        }

        // Fetch events for a competition
        async function fetchCompetitionEvents(competition) {
            const isNetlify = window.location.hostname.includes('netlify.app') || 
                             window.location.hostname.includes('netlify.com');
            
            if (isNetlify) {
                const apiUrl = `/.netlify/functions/proxy/${competition.key}`;
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`API returned ${response.status}`);
                const data = await response.json();
                return data.events?.filter(event => 
                    event.type === 'EVENT_TYPE_EVENT' &&
                    event.home && event.away &&
                    event.markets?.['soccer.match_odds']
                ) || [];
            } else {
                return generateMockEvents(competition);
            }
        }

        // Render events list in sidebar
        function renderEventsList(container, events, competition) {
            if (events.length === 0) {
                container.innerHTML = '<div style="padding: 10px 20px; color: var(--text-muted); font-size: 12px;">No events available</div>';
                return;
            }
            
            container.innerHTML = '';
            events.forEach(event => {
                const eventItem = document.createElement('div');
                eventItem.className = 'event-item';
                
                const eventDate = new Date(event.cutoffTime);
                const formattedTime = eventDate.toLocaleString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                eventItem.innerHTML = `
                    <div class="event-item-teams">${event.home.name} vs ${event.away.name}</div>
                    <div class="event-item-time">${formattedTime}</div>
                `;
                
                eventItem.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectEvent(eventItem, event, competition);
                });
                
                container.appendChild(eventItem);
            });
        }

        // Select and display event
        function selectEvent(eventItem, event, competition) {
            // Update active state
            document.querySelectorAll('.event-item').forEach(item => {
                item.classList.remove('active');
            });
            eventItem.classList.add('active');
            
            // Display event details
            displayEventDetails(event, competition);
        }

        // Generate mock events for demonstration
        function generateMockEvents(competition) {
            const teams = {
                'soccer-england-premier-league': [
                    ['Manchester City', 'Liverpool'], ['Arsenal', 'Chelsea'], 
                    ['Manchester United', 'Tottenham'], ['Newcastle', 'Brighton']
                ],
                'soccer-spain-laliga': [
                    ['Real Madrid', 'Barcelona'], ['Atletico Madrid', 'Sevilla'],
                    ['Real Sociedad', 'Valencia'], ['Villarreal', 'Athletic Bilbao']
                ],
                'soccer-germany-bundesliga': [
                    ['Bayern Munich', 'Borussia Dortmund'], ['RB Leipzig', 'Bayer Leverkusen'],
                    ['Union Berlin', 'Eintracht Frankfurt'], ['Freiburg', 'Wolfsburg']
                ],
                'soccer-italy-serie-a': [
                    ['Inter Milan', 'AC Milan'], ['Juventus', 'Napoli'],
                    ['Roma', 'Lazio'], ['Atalanta', 'Fiorentina']
                ],
                'default': [
                    ['Home Team A', 'Away Team A'], ['Home Team B', 'Away Team B'],
                    ['Home Team C', 'Away Team C'], ['Home Team D', 'Away Team D']
                ]
            };

            const matchups = teams[competition.key] || teams['default'];
            const now = new Date();
            
            return matchups.map((teams, index) => ({
                home: { name: teams[0] },
                away: { name: teams[1] },
                cutoffTime: new Date(now.getTime() + (index + 1) * 86400000).toISOString(),
                type: 'EVENT_TYPE_EVENT',
                markets: {
                    'soccer.match_odds': {
                        submarkets: {
                            'period=ft': {
                                selections: [
                                    { outcome: 'home', price: 2.1 + Math.random() * 0.5, probability: 0.4 },
                                    { outcome: 'draw', price: 3.2 + Math.random() * 0.4, probability: 0.28 },
                                    { outcome: 'away', price: 2.8 + Math.random() * 0.6, probability: 0.32 }
                                ]
                            }
                        }
                    },
                    'soccer.total_goals': {
                        submarkets: {
                            'period=ft': {
                                selections: [
                                    { outcome: 'over', params: 'total=2.5', price: 1.85 + Math.random() * 0.2, probability: 0.52 },
                                    { outcome: 'under', params: 'total=2.5', price: 1.95 + Math.random() * 0.15, probability: 0.48 }
                                ]
                            }
                        }
                    }
                }
            }));
        }

        // Load competition data from Cloudbet API
        async function loadCompetitionData(competition) {
            // Update active state
            document.querySelectorAll('.competition-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // Update header
            document.getElementById('contentTitle').textContent = competition.name;
            document.getElementById('contentSubtitle').textContent = `Loading events...`;

            // Show loading state
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <h3>Loading events...</h3>
                    <p>Fetching odds from Cloudbet API</p>
                </div>
            `;

            try {
                // Use Netlify function when deployed, fallback to mock data locally
                const isNetlify = window.location.hostname.includes('netlify.app') || 
                                 window.location.hostname.includes('netlify.com');
                
                let competitionEvents = [];
                
                if (isNetlify) {
                    // Use Netlify serverless function
                    const apiUrl = `/.netlify/functions/proxy/${competition.key}`;
                    const response = await fetch(apiUrl);
                    
                    if (!response.ok) throw new Error(`API returned ${response.status}`);
                    
                    const data = await response.json();
                    competitionEvents = data.events?.filter(event => 
                        event.type === 'EVENT_TYPE_EVENT' &&
                        event.home && event.away &&
                        event.markets?.['soccer.match_odds']
                    ) || [];
                } else {
                    // Local development - use mock data
                    competitionEvents = generateMockEvents(competition);
                }

                // Update subtitle
                const suffix = isNetlify ? '' : ' (Demo Mode)';
                document.getElementById('contentSubtitle').textContent = 
                    `${competitionEvents.length} event${competitionEvents.length !== 1 ? 's' : ''}${suffix}`;

                if (competitionEvents.length === 0) {
                    throw new Error('No events found');
                }

                renderEvents(competitionEvents);

            } catch (error) {
                console.warn('API fetch failed, using mock data:', error.message);
                const mockEvents = generateMockEvents(competition);
                document.getElementById('contentSubtitle').textContent = 
                    `${mockEvents.length} events (Demo Mode)`;
                renderEvents(mockEvents);
            }
        }

        // Display event details in central area
        function displayEventDetails(event, competition) {
            document.getElementById('contentTitle').textContent = `${event.home.name} vs ${event.away.name}`;
            
            const eventDate = new Date(event.cutoffTime);
            const formattedDate = eventDate.toLocaleString('en-US', {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            document.getElementById('contentSubtitle').textContent = `${competition.name} • ${formattedDate}`;
            
            const contentArea = document.getElementById('contentArea');
            
            // Get markets
            const matchOddsMarket = event.markets?.['soccer.match_odds']?.submarkets?.['period=ft'];
            const totalGoalsMarket = event.markets?.['soccer.total_goals']?.submarkets?.['period=ft'];
            
            let html = '<div style="max-width: 1200px;">';
            
            // Match Odds Section
            if (matchOddsMarket) {
                const homeSelection = matchOddsMarket.selections?.find(s => s.outcome === 'home');
                const drawSelection = matchOddsMarket.selections?.find(s => s.outcome === 'draw');
                const awaySelection = matchOddsMarket.selections?.find(s => s.outcome === 'away');
                
                html += `
                    <div style="margin-bottom: 32px;">
                        <h3 style="font-size: 18px; margin-bottom: 16px; color: var(--accent-primary);">Match Odds (1X2)</h3>
                        <div class="markets-grid">
                            ${homeSelection ? `
                                <div class="market-card">
                                    <div class="market-label">Home Win</div>
                                    <div class="market-odds">${homeSelection.price.toFixed(2)}</div>
                                    <div class="market-probability">${(homeSelection.probability * 100).toFixed(1)}%</div>
                                </div>
                            ` : ''}
                            ${drawSelection ? `
                                <div class="market-card">
                                    <div class="market-label">Draw</div>
                                    <div class="market-odds">${drawSelection.price.toFixed(2)}</div>
                                    <div class="market-probability">${(drawSelection.probability * 100).toFixed(1)}%</div>
                                </div>
                            ` : ''}
                            ${awaySelection ? `
                                <div class="market-card">
                                    <div class="market-label">Away Win</div>
                                    <div class="market-odds">${awaySelection.price.toFixed(2)}</div>
                                    <div class="market-probability">${(awaySelection.probability * 100).toFixed(1)}%</div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }
            
            // Total Goals Section
            if (totalGoalsMarket && totalGoalsMarket.selections) {
                // Group by total value
                const goalLines = {};
                totalGoalsMarket.selections.forEach(sel => {
                    const match = sel.params.match(/total=([\d.]+)/);
                    if (match) {
                        const total = match[1];
                        if (!goalLines[total]) goalLines[total] = {};
                        goalLines[total][sel.outcome] = sel;
                    }
                });
                
                html += `
                    <div style="margin-bottom: 32px;">
                        <h3 style="font-size: 18px; margin-bottom: 16px; color: var(--accent-primary);">Total Goals</h3>
                `;
                
                // Display popular lines
                const popularLines = ['2.5', '1.5', '3.5', '2.75', '3.25'];
                popularLines.forEach(line => {
                    if (goalLines[line]) {
                        const over = goalLines[line].over;
                        const under = goalLines[line].under;
                        
                        html += `
                            <div style="margin-bottom: 16px;">
                                <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;">Over/Under ${line}</div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                                    ${over ? `
                                        <div class="market-card">
                                            <div class="market-label">Over ${line}</div>
                                            <div class="market-odds">${over.price.toFixed(2)}</div>
                                            <div class="market-probability">${(over.probability * 100).toFixed(1)}%</div>
                                        </div>
                                    ` : ''}
                                    ${under ? `
                                        <div class="market-card">
                                            <div class="market-label">Under ${line}</div>
                                            <div class="market-odds">${under.price.toFixed(2)}</div>
                                            <div class="market-probability">${(under.probability * 100).toFixed(1)}%</div>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    }
                });
                
                html += `</div>`;
            }
            
            html += '</div>';
            contentArea.innerHTML = html;
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            document.querySelectorAll('.competition-item').forEach(item => {
                const name = item.querySelector('.competition-name').textContent.toLowerCase();
                item.style.display = name.includes(searchTerm) ? 'flex' : 'none';
            });

            // Also hide/show region headers
            document.querySelectorAll('.region-group').forEach(group => {
                const visibleItems = Array.from(group.querySelectorAll('.competition-item'))
                    .filter(item => item.style.display !== 'none');
                const regionHeader = group.previousElementSibling;
                if (regionHeader && regionHeader.classList.contains('region-header')) {
                    regionHeader.style.display = visibleItems.length > 0 ? 'block' : 'none';
                }
            });
        });

        // Initialize
        loadCompetitions();
    </script>
</body>
</html>
