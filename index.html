        // Zero-Inflated Poisson Distribution Calculator
        class ZIPDistribution {
            constructor(lambda, pi) {
                this.lambda = lambda;  // Poisson rate parameter
                this.pi = pi;          // Zero-inflation probability
            }

            // Poisson probability mass function
            poissonPMF(k) {
                return Math.exp(-this.lambda) * Math.pow(this.lambda, k) / this.factorial(k);
            }

            factorial(n) {
                if (n <= 1) return 1;
                return n * this.factorial(n - 1);
            }

            // ZIP probability mass function
            zipPMF(k) {
                if (k === 0) {
                    return this.pi + (1 - this.pi) * this.poissonPMF(0);
                } else {
                    return (1 - this.pi) * this.poissonPMF(k);
                }
            }

            // Calculate probability of exactly k goals
            probability(k) {
                return this.zipPMF(k);
            }

            // Calculate probability of k or more goals
            probabilityAtLeast(k) {
                let sum = 0;
                for (let i = k; i <= k + 10; i++) {
                    sum += this.zipPMF(i);
                }
                return sum;
            }

            // Calculate probability of fewer than k goals
            probabilityLessThan(k) {
                let sum = 0;
                for (let i = 0; i < k; i++) {
                    sum += this.zipPMF(i);
                }
                return sum;
            }
        }

        // Calculate market odds using ZIP distribution
        function calculateZIPOdds(homeOdds, awayOdds, drawOdds) {
            // Convert odds to implied probabilities
            const homeProb = 1 / homeOdds;
            const awayProb = 1 / awayOdds;
            const drawProb = 1 / drawOdds;

            // Estimate lambda parameters from implied probabilities
            const homeLambda = -Math.log(drawProb) * 0.8;
            const awayLambda = -Math.log(drawProb) * 0.8;

            // Zero-inflation parameter (estimate based on defensive strength)
            const pi = Math.max(0.05, Math.min(0.3, drawProb * 0.5));

            // Create ZIP distributions for home and away
            const homeZIP = new ZIPDistribution(homeLambda, pi);
            const awayZIP = new ZIPDistribution(awayLambda, pi);

            // Calculate various market probabilities
            const markets = {
                over_2_5: {
                    label: 'Over 2.5 Goals',
                    probability: calculateTotalGoalsProbability(homeZIP, awayZIP, 3, 'over'),
                    odds: null
                },
                under_2_5: {
                    label: 'Under 2.5 Goals',
                    probability: calculateTotalGoalsProbability(homeZIP, awayZIP, 3, 'under'),
                    odds: null
                },
                btts_yes: {
                    label: 'Both Teams to Score',
                    probability: (1 - homeZIP.probability(0)) * (1 - awayZIP.probability(0)),
                    odds: null
                },
                btts_no: {
                    label: 'BTTS No',
                    probability: homeZIP.probability(0) + awayZIP.probability(0) - homeZIP.probability(0) * awayZIP.probability(0),
                    odds: null
                },
                home_win: {
                    label: 'Home Win',
                    probability: homeProb,
                    odds: homeOdds
                },
                draw: {
                    label: 'Draw',
                    probability: drawProb,
                    odds: drawOdds
                },
                away_win: {
                    label: 'Away Win',
                    probability: awayProb,
                    odds: awayOdds
                }
            };

            // Convert probabilities to fair odds (removing margin)
            Object.keys(markets).forEach(key => {
                if (!markets[key].odds) {
                    markets[key].odds = 1 / markets[key].probability;
                }
            });

            return {
                markets,
                zipParams: {
                    homeLambda: homeLambda.toFixed(3),
                    awayLambda: awayLambda.toFixed(3),
                    pi: pi.toFixed(3)
                }
            };
        }

        function calculateTotalGoalsProbability(homeZIP, awayZIP, threshold, type) {
            let prob = 0;
            for (let h = 0; h <= 10; h++) {
                for (let a = 0; a <= 10; a++) {
                    const total = h + a;
                    if (type === 'over' && total >= threshold) {
                        prob += homeZIP.probability(h) * awayZIP.probability(a);
                    } else if (type === 'under' && total < threshold) {
                        prob += homeZIP.probability(h) * awayZIP.probability(a);
                    }
                }
            }
            return prob;
        }

                item.classList.remove('expanded');
            });
            document.querySelectorAll('.events-sublist').forEach(list => {
                list.classList.remove('expanded');
            });

            // Expand this competition

            eventsContainer.classList.add('expanded');

        // Calculate margin from odds (bookmaker overround)
        function calculateMargin(odds) {
            const sum = odds.reduce((acc, odd) => acc + (1 / odd), 0);
            return ((sum - 1) * 100).toFixed(2);
        }

        // Convert to implied odds (no margin)
        function toImpliedOdds(odds) {
            const sum = odds.reduce((acc, odd) => acc + (1 / odd), 0);
            return odds.map(odd => odd * sum);
        }

                const homeSelection = matchOddsMarket.selections?.find(s => s.outcome === 'home');
                const drawSelection = matchOddsMarket.selections?.find(s => s.outcome === 'draw');
                const awaySelection = matchOddsMarket.selections?.find(s => s.outcome === 'away');
                
                if (homeSelection && drawSelection && awaySelection) {
                    const feedOdds = [homeSelection.price, drawSelection.price, awaySelection.price];
                    const margin = calculateMargin(feedOdds);
                    
                    let displayOdds, displayProbs;
                    if (currentOddsMode === 'implied') {
                        displayOdds = toImpliedOdds(feedOdds);
                        displayProbs = displayOdds.map(odd => 1 / odd);
                    } else {
                        displayOdds = feedOdds;
                        displayProbs = feedOdds.map(odd => 1 / odd);
                    }
                    
                    html += `
                        <div class="market-section">
                            <h3>
                                Match Odds (1X2)
                                ${currentOddsMode === 'feed' ? `<span class="margin-badge">Margin: ${margin}%</span>` : ''}
                            </h3>
                            <div class="markets-grid">
                                <div class="market-card">
                                    <div class="market-label">Home Win</div>
                                    <div class="market-odds">${displayOdds[0].toFixed(2)}</div>
                                    <div class="market-probability">${(displayProbs[0] * 100).toFixed(1)}%</div>
                                </div>
                                <div class="market-card">
                                    <div class="market-label">Draw</div>
                                    <div class="market-odds">${displayOdds[1].toFixed(2)}</div>
                                    <div class="market-probability">${(displayProbs[1] * 100).toFixed(1)}%</div>
                                </div>
                                <div class="market-card">
                                    <div class="market-label">Away Win</div>
                                    <div class="market-odds">${displayOdds[2].toFixed(2)}</div>
                                    <div class="market-probability">${(displayProbs[2] * 100).toFixed(1)}%</div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
            
            // Total Goals Section
            if (totalGoalsMarket && totalGoalsMarket.selections) {
                const goalLines = {};
                totalGoalsMarket.selections.forEach(sel => {
                    const match = sel.params.match(/total=([\d.]+)/);
                    if (match) {
                        const total = match[1];
                        if (!goalLines[total]) goalLines[total] = {};
                        goalLines[total][sel.outcome] = sel;
                    }
                });
                
                html += `<div class="market-section"><h3>Total Goals</h3>`;
                
                const popularLines = ['2.5', '1.5', '3.5', '2.75', '3.25'];
                popularLines.forEach(line => {
                    if (goalLines[line] && goalLines[line].over && goalLines[line].under) {
                        const over = goalLines[line].over;
                        const under = goalLines[line].under;
                        
                        const feedOdds = [over.price, under.price];
                        const margin = calculateMargin(feedOdds);
                        
                        let displayOdds, displayProbs;
                        if (currentOddsMode === 'implied') {
                            displayOdds = toImpliedOdds(feedOdds);
                            displayProbs = displayOdds.map(odd => 1 / odd);
                        } else {
                            displayOdds = feedOdds;
                            displayProbs = feedOdds.map(odd => 1 / odd);
                        }
                        
                        html += `
                            <div class="goal-line-section">
                                <div class="goal-line-header">
                                    Over/Under ${line}
                                    ${currentOddsMode === 'feed' ? `<span style="color: #ff8800; margin-left: 8px;">+${margin}%</span>` : ''}
                                </div>
                                <div class="goal-line-grid">
                                    <div class="market-card">
                                        <div class="market-label">Over ${line}</div>
                                        <div class="market-odds">${displayOdds[0].toFixed(2)}</div>
                                        <div class="market-probability">${(displayProbs[0] * 100).toFixed(1)}%</div>
                                    </div>
                                    <div class="market-card">
                                        <div class="market-label">Under ${line}</div>
                                        <div class="market-odds">${displayOdds[1].toFixed(2)}</div>
                                        <div class="market-probability">${(displayProbs[1] * 100).toFixed(1)}%</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
                
                html += `</div>`;
            }
            
            html += '</div>';
            contentArea.innerHTML = html;
        }

        // Toggle buttons
        document.getElementById('feedOddsBtn').addEventListener('click', () => {
            currentOddsMode = 'feed';
            document.getElementById('feedOddsBtn').classList.add('active');
            document.getElementById('impliedOddsBtn').classList.remove('active');
            if (currentEvent) renderOdds();
        });

        document.getElementById('impliedOddsBtn').addEventListener('click', () => {
            currentOddsMode = 'implied';
            document.getElementById('impliedOddsBtn').classList.add('active');
            document.getElementById('feedOddsBtn').classList.remove('active');
            if (currentEvent) renderOdds();
        });

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            document.querySelectorAll('.competition-item').forEach(item => {
                const name = item.querySelector('.competition-name').textContent.toLowerCase();
                item.style.display = name.includes(searchTerm) ? 'flex' : 'none';
            });

            // Also hide/show region headers
            document.querySelectorAll('.region-group').forEach(group => {
                const visibleItems = Array.from(group.querySelectorAll('.competition-item'))
                    .filter(item => item.style.display !== 'none');
                const regionHeader = group.previousElementSibling;
                if (regionHeader && regionHeader.classList.contains('region-header')) {
                    regionHeader.style.display = visibleItems.length > 0 ? 'block' : 'none';
                }
            });
        });

        // Initialize
        loadCompetitions();
    </script>
</body>
</html>
