<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betting Feed Provider - ZIP Distribution</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Global Timer in Sidebar */
        .global-timer {
            margin-top: 8px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 255, 136, 0.08);
            color: var(--accent-primary);
            padding: 6px 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        .timer-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .timer-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
        }
        .timer-dot.active {
            background: var(--accent-primary);
            box-shadow: 0 0 8px var(--accent-primary);
        }
        .refresh-icon {
            font-size: 10px;
        }
        .refresh-icon.spinning {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Betting Feed</h1>
                <p>Zero-Inflated Poisson</p>
                
                <div class="global-timer">
                    <div class="timer-status">
                        <span id="timerDot" class="timer-dot"></span>
                        <span id="refreshText">Idle</span>
                    </div>
                    <span class="refresh-icon">↻</span>
                </div>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search competitions...">
            </div>
            
            <div class="competitions-list" id="competitionsList">
                <div class="loading-state" style="padding: 20px; font-size: 12px;">Initializing...</div>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="content-header">
                <div class="content-header-text">
                    <h2 id="contentTitle">Select a Competition</h2>
                    <div class="subtitle">
                        <span class="status-dot"></span>
                        <span id="contentSubtitle">Choose from the sidebar to view betting odds</span>
                    </div>
                </div>
                <div class="odds-toggle">
                    <button class="toggle-button active" id="feedOddsBtn">Feed Odds</button>
                    <button class="toggle-button" id="impliedOddsBtn">Implied Odds</button>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 320px; gap: 24px;">
                <div id="contentArea">
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 16px;">⚽</div>
                        <h3>No Competition Selected</h3>
                        <p style="margin-top: 8px;">Select a competition to start monitoring odds</p>
                    </div>
                </div>
                
                <div class="odds-changes-panel">
                    <div class="odds-changes-header">
                        <h3>Odds Changes</h3>
                        <div class="threshold-control">
                            <label>Min. Change:</label>
                            <input type="number" id="thresholdInput" value="2" min="1" max="50" step="0.5">
                            <span>%</span>
                        </div>
                    </div>
                    <div id="oddsChanges" class="odds-changes-list">
                        <div class="odds-changes-empty">
                            No changes detected yet. <br>
                            Select a competition to start monitoring all matches.
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION & STATE
        // ==========================================
        const API_PROXY_URL = '/.netlify/functions/proxy';
        
        let currentOddsMode = 'feed'; 
        let currentEvent = null;            // The specific match being viewed
        let currentCompetition = null;      // The active competition being monitored
        let currentCompetitionEvents = [];  // Store ALL events in the competition for comparison
        
        // Timer State
        let countdownHandle = null;
        let secondsRemaining = 15;
        const REFRESH_SECONDS = 15;
        let changeThreshold = 2.0;

        // ==========================================
        // 1. DATA FETCHING (COMPETITIONS)
        // ==========================================

        async function initApp() {
            const list = document.getElementById('competitionsList');
            list.innerHTML = '<div class="loading-state" style="padding:20px;">Loading competitions...</div>';

            try {
                const isNetlify = window.location.hostname.includes('netlify.app') || 
                                 window.location.hostname.includes('netlify.com');
                
                if (isNetlify) {
                    const response = await fetch(`${API_PROXY_URL}/soccer`);
                    if (!response.ok) throw new Error(`API Error: ${response.status}`);
                    const data = await response.json();
                    
                    if (data.categories) renderSidebar(data.categories);
                    else if (data.competitions) renderSidebar(groupCompetitions(data.competitions));
                    else list.innerHTML = '<div class="empty-state">No competitions found</div>';
                } else {
                    console.warn("Local Dev: Using mock data.");
                    renderSidebar(generateMockCategories());
                }

            } catch (error) {
                console.error("Init Error:", error);
                list.innerHTML = `<div class="empty-state" style="color: #ff4444">Error: ${error.message}</div>`;
            }
        }

        function groupCompetitions(competitions) {
            const groups = {};
            competitions.forEach(comp => {
                if (!comp.name) return;
                const category = comp.category ? comp.category.name : 'International';
                if (!groups[category]) groups[category] = [];
                groups[category].push(comp);
            });
            return Object.keys(groups).sort().map(cat => ({
                name: cat,
                competitions: groups[cat].sort((a, b) => (b.eventCount || 0) - (a.eventCount || 0))
            }));
        }

        // ==========================================
        // 2. UI RENDERING & INTERACTION
        // ==========================================

        function renderSidebar(categories) {
            const list = document.getElementById('competitionsList');
            list.innerHTML = '';

            categories.sort((a, b) => a.name.localeCompare(b.name));

            categories.forEach(category => {
                if (!category.competitions || category.competitions.length === 0) return;

                const regionHeader = document.createElement('div');
                regionHeader.className = 'region-header';
                regionHeader.textContent = category.name;
                list.appendChild(regionHeader);

                const regionGroup = document.createElement('div');
                regionGroup.className = 'region-group';

                category.competitions.forEach(comp => {
                    const item = document.createElement('div');
                    item.className = 'competition-item';
                    item.dataset.key = comp.key;
                    item.innerHTML = `
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="expand-icon">▶</span>
                            <span class="competition-name">${comp.name}</span>
                        </div>
                        <span class="event-count">${comp.eventCount || 0}</span>
                    `;
                    
                    const eventsContainer = document.createElement('div');
                    eventsContainer.className = 'events-sublist';
                    
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleCompetition(item, eventsContainer, comp);
                    });
                    
                    regionGroup.appendChild(item);
                    regionGroup.appendChild(eventsContainer);
                });

                list.appendChild(regionGroup);
            });
        }

        async function toggleCompetition(item, container, competition) {
            const isExpanded = item.classList.contains('expanded');
            
            // UI Cleanup
            document.querySelectorAll('.competition-item').forEach(i => i.classList.remove('expanded'));
            document.querySelectorAll('.events-sublist').forEach(l => l.classList.remove('expanded'));
            
            if (isExpanded) {
                // Clicking same one collapses it and stops monitoring
                stopAutoRefresh();
                currentCompetition = null;
                return;
            }
            
            // Expand and Activate
            item.classList.add('expanded');
            container.classList.add('expanded');
            
            // Set Global Competition State
            currentCompetition = competition;
            startAutoRefresh(); // Start monitoring immediately!

            // Initial Load
            if (container.children.length === 0) {
                container.innerHTML = '<div style="padding: 10px 20px; color: var(--text-muted); font-size: 12px;">Loading events...</div>';
                try {
                    const events = await fetchCompetitionEvents(competition);
                    currentCompetitionEvents = events; // Store baseline for diffing
                    renderEventsList(container, events, competition);
                } catch (error) {
                    container.innerHTML = `<div style="padding: 10px 20px; color: var(--text-muted); font-size: 12px;">Error loading events</div>`;
                }
            }
        }

        function renderEventsList(container, events, competition) {
            container.innerHTML = events.length ? '' : '<div style="padding: 10px 20px; color: var(--text-muted); font-size: 12px;">No events available</div>';
            
            events.forEach(event => {
                const eventItem = document.createElement('div');
                eventItem.className = 'event-item';
                // Add ID to find it later easily
                eventItem.dataset.matchId = `${event.home.name}-${event.away.name}`; 
                
                const time = new Date(event.cutoffTime).toLocaleString('en-US', {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                
                eventItem.innerHTML = `
                    <div class="event-item-teams">${event.home.name} vs ${event.away.name}</div>
                    <div class="event-item-time">${time}</div>
                `;
                
                eventItem.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectEvent(eventItem, event, competition);
                });
                
                container.appendChild(eventItem);
            });
        }

        function selectEvent(eventItem, event, competition) {
            document.querySelectorAll('.event-item').forEach(i => i.classList.remove('active'));
            eventItem.classList.add('active');
            displayEventDetails(event, competition);
        }

        // ==========================================
        // 3. GLOBAL ODDS MONITORING
        // ==========================================

        function startAutoRefresh() {
            if (countdownHandle) clearInterval(countdownHandle);
            
            document.getElementById('timerDot').classList.add('active');
            secondsRemaining = REFRESH_SECONDS;
            updateRefreshUI(false);
            
            countdownHandle = setInterval(() => {
                secondsRemaining--;
                
                if (secondsRemaining <= 0) {
                    refreshCompetitionOdds(); // The global update function
                    secondsRemaining = REFRESH_SECONDS;
                }
                
                updateRefreshUI(secondsRemaining === REFRESH_SECONDS);
            }, 1000);
        }

        function stopAutoRefresh() {
            if (countdownHandle) clearInterval(countdownHandle);
            document.getElementById('timerDot').classList.remove('active');
            document.getElementById('refreshText').textContent = "Idle";
            document.querySelector('.refresh-icon').classList.remove('spinning');
        }

        function updateRefreshUI(isFetching) {
            const textEl = document.getElementById('refreshText');
            const iconEl = document.querySelector('.refresh-icon');
            
            if (isFetching || secondsRemaining === 0) {
                textEl.textContent = `Updating ${currentCompetition ? currentCompetition.name : ''}...`;
                iconEl.classList.add('spinning');
            } else {
                textEl.textContent = `Next scan: ${secondsRemaining}s`;
                iconEl.classList.remove('spinning');
            }
        }

        async function refreshCompetitionOdds() {
            if (!currentCompetition) return;

            try {
                // 1. Fetch ALL events for the active competition
                const freshEvents = await fetchCompetitionEvents(currentCompetition);
                
                // 2. Loop through EVERY fresh event to check for changes
                freshEvents.forEach(newEvent => {
                    // Find the matching old event from our stored state
                    const oldEvent = currentCompetitionEvents.find(e => 
                        e.home.name === newEvent.home.name && 
                        e.away.name === newEvent.away.name
                    );

                    if (oldEvent) {
                        detectOddsChanges(oldEvent, newEvent);
                    }
                });

                // 3. Update the global state with new data
                currentCompetitionEvents = freshEvents;

                // 4. Update the Main View ONLY if the user is looking at a specific match
                if (currentEvent) {
                    const updatedCurrentEvent = freshEvents.find(e => 
                        e.home.name === currentEvent.home.name && 
                        e.away.name === currentEvent.away.name
                    );
                    
                    if (updatedCurrentEvent) {
                        currentEvent = updatedCurrentEvent;
                        renderOdds(); // Re-render the center panel
                    }
                }

            } catch (error) {
                console.error('Global Refresh failed:', error);
            }
        }

        // ==========================================
        // 4. CHANGE DETECTION
        // ==========================================

        function detectOddsChanges(oldEvent, newEvent) {
            const matchKey = `${oldEvent.home.name} vs ${oldEvent.away.name}`;
            
            const getMarket = (e) => e.markets?.['soccer.match_odds']?.submarkets?.['period=ft'];
            const oldMarket = getMarket(oldEvent);
            const newMarket = getMarket(newEvent);
            
            if (!oldMarket || !newMarket) return;
            
            ['home', 'draw', 'away'].forEach(outcome => {
                const oldSel = oldMarket.selections?.find(s => s.outcome === outcome);
                const newSel = newMarket.selections?.find(s => s.outcome === outcome);
                
                if (oldSel && newSel && oldSel.price !== newSel.price) {
                    const change = ((newSel.price - oldSel.price) / oldSel.price) * 100;
                    
                    if (Math.abs(change) >= changeThreshold) {
                        addOddsChange({
                            time: new Date(),
                            match: matchKey, // Shows which match changed!
                            market: `1X2 - ${outcome.toUpperCase()}`,
                            oldOdds: oldSel.price,
                            newOdds: newSel.price,
                            change: change
                        });
                    }
                }
            });
        }

        function addOddsChange(change) {
            const container = document.getElementById('oddsChanges');
            const emptyMsg = container.querySelector('.odds-changes-empty');
            if (emptyMsg) emptyMsg.remove();
            
            const changeEl = document.createElement('div');
            changeEl.className = 'odds-change-item';
            
            // Format time
            const timeStr = change.time.toLocaleTimeString([], { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });

            changeEl.innerHTML = `
                <div class="odds-change-header">
                    <span class="odds-change-time">${timeStr}</span>
                    <span class="odds-change-percentage ${change.change > 0 ? 'positive' : 'negative'}">
                        ${change.change > 0 ? '+' : ''}${change.change.toFixed(1)}%
                    </span>
                </div>
                <div style="font-size: 11px; color: var(--accent-primary); margin-bottom: 2px;">${change.match}</div>
                <div class="odds-change-market">${change.market}</div>
                <div class="odds-change-odds">
                    ${change.oldOdds.toFixed(2)} → ${change.newOdds.toFixed(2)}
                </div>
            `;
            
            container.insertBefore(changeEl, container.firstChild);
            
            if (container.children.length > 50) { // Increased history limit
                container.removeChild(container.lastChild);
            }
        }

        // ==========================================
        // 5. HELPER FUNCTIONS
        // ==========================================

        async function fetchCompetitionEvents(competition) {
            const isNetlify = window.location.hostname.includes('netlify.app') || 
                             window.location.hostname.includes('netlify.com');
            
            if (isNetlify) {
                const apiUrl = `${API_PROXY_URL}/${competition.key}`;
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(response.statusText);
                const data = await response.json();
                return data.events?.filter(e => 
                    e.type === 'EVENT_TYPE_EVENT' && e.home && e.away && e.markets?.['soccer.match_odds']
                ) || [];
            } else {
                return generateMockEvents(competition);
            }
        }

        function displayEventDetails(event, competition) {
            currentEvent = event;
            document.getElementById('contentTitle').textContent = `${event.home.name} vs ${event.away.name}`;
            
            const dateStr = new Date(event.cutoffTime).toLocaleString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });
            document.getElementById('contentSubtitle').textContent = `${competition.name} • ${dateStr}`;
            renderOdds();
        }

        function renderOdds() {
            if (!currentEvent) return;
            const contentArea = document.getElementById('contentArea');
            const matchOdds = currentEvent.markets?.['soccer.match_odds']?.submarkets?.['period=ft'];
            const totalGoals = currentEvent.markets?.['soccer.total_goals']?.submarkets?.['period=ft'];
            
            let html = '<div style="max-width: 1200px;">';
            
            // Match Odds
            if (matchOdds) {
                const home = matchOdds.selections.find(s => s.outcome === 'home');
                const draw = matchOdds.selections.find(s => s.outcome === 'draw');
                const away = matchOdds.selections.find(s => s.outcome === 'away');
                
                if (home && draw && away) {
                    const rawOdds = [home.price, draw.price, away.price];
                    const displayOdds = currentOddsMode === 'implied' ? toImpliedOdds(rawOdds) : rawOdds;
                    const probs = displayOdds.map(o => 1/o);
                    const margin = calculateMargin(rawOdds);
                    
                    html += `
                        <div class="market-section">
                            <h3>Match Odds (1X2) ${currentOddsMode === 'feed' ? `<span class="margin-badge">Margin: ${margin}%</span>` : ''}</h3>
                            <div class="markets-grid">
                                ${renderCard('Home Win', displayOdds[0], probs[0])}
                                ${renderCard('Draw', displayOdds[1], probs[1])}
                                ${renderCard('Away Win', displayOdds[2], probs[2])}
                            </div>
                        </div>`;
                }
            }

            // Totals
            if (totalGoals) {
                const lines = {};
                totalGoals.selections.forEach(s => {
                    const m = s.params.match(/total=([\d.]+)/);
                    if (m) {
                        if (!lines[m[1]]) lines[m[1]] = {};
                        lines[m[1]][s.outcome] = s;
                    }
                });

                html += `<div class="market-section"><h3>Total Goals</h3>`;
                ['2.5', '1.5', '3.5'].forEach(line => {
                    if (lines[line]?.over && lines[line]?.under) {
                        const raw = [lines[line].over.price, lines[line].under.price];
                        const disp = currentOddsMode === 'implied' ? toImpliedOdds(raw) : raw;
                        const probs = disp.map(o => 1/o);
                        
                        html += `
                            <div class="goal-line-section">
                                <div class="goal-line-header">Over/Under ${line}</div>
                                <div class="goal-line-grid">
                                    ${renderCard(`Over ${line}`, disp[0], probs[0])}
                                    ${renderCard(`Under ${line}`, disp[1], probs[1])}
                                </div>
                            </div>`;
                    }
                });
                html += `</div>`;
            }
            
            html += '</div>';
            contentArea.innerHTML = html;
        }

        function renderCard(label, odds, prob) {
            return `
                <div class="market-card">
                    <div class="market-label">${label}</div>
                    <div class="market-odds">${odds.toFixed(2)}</div>
                    <div class="market-probability">${(prob * 100).toFixed(1)}%</div>
                </div>`;
        }

        // Utils
        function calculateMargin(odds) { return ((odds.reduce((a, b) => a + 1/b, 0) - 1) * 100).toFixed(2); }
        function toImpliedOdds(odds) { const sum = odds.reduce((a, b) => a + 1/b, 0); return odds.map(o => o * sum); }
        function generateMockCategories() { return [{ name: "Demo League", competitions: [{ name: "Premier League", key: "demo", eventCount: 5 }] }]; }
        function generateMockEvents(comp) {
            // Mock data that changes randomly to test the diff engine
            const now = new Date();
            return [1, 2, 3, 4, 5].map(i => ({
                home: { name: `Home ${i}` }, away: { name: `Away ${i}` },
                cutoffTime: new Date(now.getTime() + i*86400000).toISOString(),
                type: 'EVENT_TYPE_EVENT',
                markets: {
                    'soccer.match_odds': {
                        submarkets: { 'period=ft': { selections: [
                            { outcome: 'home', price: 2 + (Math.random() * 0.1), probability: 0.45 },
                            { outcome: 'draw', price: 3 + (Math.random() * 0.1), probability: 0.25 },
                            { outcome: 'away', price: 3.5 + (Math.random() * 0.1), probability: 0.30 }
                        ]}}
                    },
                    'soccer.total_goals': { submarkets: { 'period=ft': { selections: [
                        { outcome: 'over', params: 'total=2.5', price: 1.9, probability: 0.5 },
                        { outcome: 'under', params: 'total=2.5', price: 1.9, probability: 0.5 }
                    ]}}}
                }
            }));
        }

        // Event Listeners
        document.getElementById('feedOddsBtn').addEventListener('click', () => {
            currentOddsMode = 'feed';
            document.getElementById('feedOddsBtn').classList.add('active');
            document.getElementById('impliedOddsBtn').classList.remove('active');
            renderOdds();
        });
        document.getElementById('impliedOddsBtn').addEventListener('click', () => {
            currentOddsMode = 'implied';
            document.getElementById('impliedOddsBtn').classList.add('active');
            document.getElementById('feedOddsBtn').classList.remove('active');
            renderOdds();
        });
        document.getElementById('thresholdInput').addEventListener('change', (e) => {
            changeThreshold = parseFloat(e.target.value) || 2.0;
        });

        // Initialize
        initApp();
    </script>
</body>
</html>
